version: '3.8'

services:
  # SSO认证服务
  ch-sso:
    image: chaohua2025/ch-sso:2.1.0-SNAPSHOT
    container_name: ch-sso
    restart: always
    ports:
      - "7001:8080"
    environment:
      JAVA_OPTS: "-Dnacos.config.server-addr=host.docker.internal:8848 -Dnacos.config.namespace=public -Dspring.cloud.nacos.username=nacos -Dspring.cloud.nacos.password=nacos -Dspring.profiles.active=test"
      TZ: Asia/Shanghai
    # 依赖外部Nacos服务
    networks:
      - ch-network

  # UPMS权限管理服务
  ch-upms:
    image: chaohua2025/ch-upms:20250906032302
    container_name: ch-upms
    restart: always
    ports:
      - "7002:8080"
    environment:
      JAVA_OPTS: "-Dnacos.config.server-addr=host.docker.internal:8848 -Dnacos.config.namespace=public -Dspring.cloud.nacos.username=nacos -Dspring.cloud.nacos.password=nacos -Dspring.profiles.active=test"
      TZ: Asia/Shanghai
    # 依赖外部Nacos服务
    networks:
      - ch-network

  # Gateway网关服务
  ch-gateway:
    image: chaohua2025/ch-gateway:20250906035834
    container_name: ch-gateway
    restart: always
    ports:
      - "7000:8080"
    environment:
      JAVA_OPTS: "-Dnacos.config.server-addr=host.docker.internal:8848 -Dnacos.config.namespace=public -Dspring.cloud.nacos.username=nacos -Dspring.cloud.nacos.password=nacos -Dspring.profiles.active=test"
      TZ: Asia/Shanghai
    depends_on:
      - ch-sso
      - ch-upms
      # 依赖外部Nacos服务
    networks:
      - ch-network

  # DevOps中间件管理服务
  ch-devops:
    image: chaohua2025/ch-devops:20250906034927
    container_name: ch-devops
    restart: always
    ports:
      - "7003:8080"
    environment:
      JAVA_OPTS: "-Dnacos.config.server-addr=host.docker.internal:8848 -Dnacos.config.namespace=public -Dspring.cloud.nacos.username=nacos -Dspring.cloud.nacos.password=nacos -Dspring.profiles.active=test"
      TZ: Asia/Shanghai
    # 依赖外部Nacos服务
    networks:
      - ch-network

  # Admin前端管理界面
  ch-admin:
    image: chaohua2025/ch-admin:20250809021803
    container_name: ch-admin
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./conf/ch-admin/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ch-gateway
    networks:
      - ch-network

networks:
  ch-network:
    driver: bridge
